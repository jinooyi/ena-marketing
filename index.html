<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ENA Marketing | Coming Soon</title>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    .poppins { font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  </style>
</head>

<body class="bg-[#F5F3EE]">
  <div class="min-h-screen flex items-center justify-center px-5 py-10">
    <div class="w-full max-w-xl text-center">
      <!-- 둥근 프레임 유지 -->
      <div class="mx-auto mb-8 w-36 h-36 sm:w-40 sm:h-40 rounded-full overflow-hidden ring-1 ring-black/10 shadow-lg bg-white">
        <img src="./background.png" alt="Logo" class="w-full h-full object-cover" />
      </div>

      <!-- Coming Soon -->
      <h1 class="poppins text-3xl sm:text-4xl font-extrabold tracking-tight text-gray-900 mb-3">
        Coming Soon
      </h1>

      <!-- 한 줄 고정(넘치면 ... 처리) -->
      <p class="poppins text-base sm:text-lg font-light text-gray-700 mb-7 px-2
                whitespace-nowrap overflow-hidden text-ellipsis mx-auto max-w-full">
        We're working hard to bring you something awesome.
      </p>

      <form id="contactForm" action="https://formspree.io/f/xpqjbdpl" method="POST" class="mx-auto w-full max-w-md">
        <div class="flex flex-col sm:flex-row gap-3 items-stretch">
          <input
            type="email"
            name="email"
            placeholder="이메일 주소 입력"
            required
            class="w-full h-12 bg-white border border-gray-300 text-gray-900 placeholder-gray-400
                   px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-500"
          />

          <input type="hidden" name="_subject" value="[ENA Marketing] 상담문의" />

          <!-- honeypot (봇 방지) -->
          <div class="hidden">
            <label>Don’t fill this out if you’re human:
              <input name="_gotcha" />
            </label>
          </div>

          <!-- 버튼 -->
          <button
            id="sendBtn"
            type="submit"
            class="h-12 px-5 rounded-xl whitespace-nowrap font-semibold
                   bg-gray-700 hover:bg-gray-800 text-white
                   focus:outline-none focus:ring-2 focus:ring-gray-500
                   disabled:opacity-50 disabled:cursor-not-allowed"
          >
            상담문의
          </button>
        </div>

        <p id="status" class="mt-3 text-sm text-gray-600 min-h-[20px]"></p>
      </form>

      <p class="mt-6 text-xs text-gray-500">
        ENA Marketing · contact@ena-marketing.com
      </p>
    </div>
  </div>

  <script>
    // Formspree: 페이지 이동 없이 전송 + 상태 메시지 표시
    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "";
      sendBtn.disabled = true;
      const original = sendBtn.textContent;
      sendBtn.textContent = "Sending...";

      try {
        const formData = new FormData(form);
        const res = await fetch(form.action, {
          method: "POST",
          body: formData,
          headers: { "Accept": "application/json" }
        });

        if (res.ok) {
          statusEl.textContent = "요청 완료! 곧 연락드리겠습니다.";
          form.reset();
        } else {
          let msg = "전송 실패. 잠시 후 다시 시도해주세요.";
          try {
            const data = await res.json();
            if (data?.errors?.length) msg = data.errors.map(x => x.message).join(" / ");
          } catch (_) {}
          statusEl.textContent = msg;
        }
      } catch (err) {
        statusEl.textContent = "네트워크 오류. 연결을 확인 후 다시 시도해주세요.";
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = original;
      }
    });
  </script>
</body>
</html>
